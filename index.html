<!DOCTYPE html>
<html lang = "ja">
<head>
	<meta charset = "UTF-8">
	<meta name = "viewport" content = "width=device-width, initial-scale=1.0">
	<title>Happy Birthday Itaita!</title>
	<link rel = "stylesheet" href = "style.css">
</head>
<body>
	<div id="loading">
		<img src ="IMG_0051.png" class = "bubble b1">
		<img src ="IMG_0052.png" class = "bubble b2">
		<img src ="IMG_0053.png" class = "bubble b3">
		<img src="IMG_0051.png" class="bubble b4">
		<img src="IMG_0052.png" class="bubble b5">
		<img src="IMG_0053.png" class="bubble b6">
		<img src="IMG_0051.png" class="bubble b7">
		<img src="IMG_0052.png" class="bubble b8">
		<div class = "loader"></div>
	</div>
	<main id="contents">

    	<!-- 光 -->
    	<div class="light light1"></div>
    	<div class="light light2"></div>
    	<div class="light light3"></div>

    	<!-- 水のゆらぎ -->
    	<div class="water"></div>
    	
    	<!--泡-->
		<div class="bg-bubbles">
    	<span class="bubble-small s1"></span>
    	<span class="bubble-small s2"></span>
    	<span class="bubble-small s3"></span>
    	<span class="bubble-small s4"></span>
    	<span class="bubble-small s5"></span>
    	<span class="bubble-small s6"></span>
	</div>
    	<div class="container">

        	<h1 class="fadein title">
            	Thank you for joining our party!
        	</h1>

        	<div class="glass fadein">

            	<p>
                	本日は素晴らしい誕生日会にご参列いただき、
                	ありがとうございました。
            	</p>

            	<p>
                	我々マーメイドラグーンの仲間たちによる公演は
                	お楽しみいただけましたか？
            	</p>

            	<p>
                	海の中の素敵な時間は一瞬ですが、
                	これからも我々はあなたの一年が
                	笑顔あふれるものとなるよう
                	ずっと願っております。
            	</p>

        	</div>
        	<a href="Birthday.pdf" class="pdf-btn">
    			団員たちの忘れ物
			</a>

    	</div>

	</main>
  	
<script>
window.addEventListener("load", () => {

  setTimeout(() => {
    document.getElementById("loading").classList.add("loaded");

    const title = document.querySelector(".title");
	const glass = document.querySelector(".glass");
	title.classList.add("show");
	setTimeout(() => {
    	glass.classList.add("show");
	}, 3000);

  }, 5000);

});
</script>
</body>
</html>
