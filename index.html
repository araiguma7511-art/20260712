<!DOCTYPE html>
<html lang = "ja">
<head>
	<meta charset = "UTF-8">
	<meta name = "viewport" content = "width=device-width, initial-scale=1.0">
	<title>Happy Birthday Itaita!</title>
	<link rel = "stylesheet" href = "style.css">
</head>
<body>
	<div class="loader">
  	<div class="looping-rhombuses-spinner">
    <div class="rhombus"></div>
    <div class="rhombus"></div>
    <div class="rhombus"></div>
  </div>
  <p class="txt">こんにちは！</p>
</div>
	<div class = "container">
		<h1>Invitaion</h1>
		<p class = "subtitle">
			We invitate you to a magical birthday party.
		</p>
	</div>
<script>
$(function(){
  // ローダー終了
  function end_loader() {
    $('#loader03').fadeOut(800);
  }
  // ローディング表示
  function show_load() {
    $('#loader03 .looping-rhombuses-spinner').fadeIn(400);
  }
  // ローディング非表示
  function hide_load() {
    $('#loader03 .looping-rhombuses-spinner').fadeOut(400);
  }
  // テキスト表示
  function show_txt() {
    $('#loader03 .txt').fadeIn(400);
  }
 
  // タイマー処理
  $(window).on('load', function () {
  // 処理①
  setTimeout(function () {
    show_load();
  }, 800)
  // 処理②
  setTimeout(function () {
    hide_load();
  }, 3500)
  // 処理③
  setTimeout(function () {
    show_txt();
  }, 4000)
  // 処理④
  setTimeout(function () {
    end_loader();
  }, 5000)
  })
})
</script>
</body>
</html>
